name: Build Android APK

on:
  workflow_dispatch:          # manual "Run workflow" button on GitHub
  push:
    branches: [main]          # auto-build on every merge to main

permissions:
  contents: write             # needed to create/update the release

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90       # first build downloads SDK/NDK — give it room

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev cmake \
            libffi-dev libssl-dev \
            libltdl-dev

      - name: Install buildozer and Cython
        run: pip install 'buildozer>=1.5' 'cython>=3'

      # Cache buildozer's entire home dir: SDK, NDK, p4a build artifacts.
      # Key changes when buildozer.spec or custom_recipes change.
      # v4 prefix: busts the broken v3 cache (stale surface.so without NEON fix).
      # Falls back to older v4 builds, then to v3 builds if no v4 exists yet.
      - name: Cache buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v4-${{ hashFiles('buildozer.spec', 'custom_recipes/**') }}
          restore-keys: |
            buildozer-v4-
            buildozer-v3-

      # When the cache is restored from an older entry (partial key match), the
      # cached pygame build may predate recipe changes.  Detect this by comparing
      # a SHA256 stamp of the recipe against the one stored inside the cache; if
      # they differ, wipe only the pygame build artifacts so buildozer rebuilds
      # just pygame (~10 min) without re-downloading the entire SDK/NDK/Python.
      - name: Invalidate stale pygame build if recipe changed
        run: |
          RECIPE=custom_recipes/pygame/__init__.py
          STAMP=~/.buildozer/.pygame_recipe_stamp
          CURRENT=$(sha256sum "$RECIPE" | cut -d' ' -f1)
          CACHED=""
          [ -f "$STAMP" ] && CACHED=$(cat "$STAMP")
          if [ "$CURRENT" = "$CACHED" ]; then
            echo "pygame recipe unchanged — cached build is valid"
          else
            echo "pygame recipe changed ($CACHED → $CURRENT) — purging stale artifacts"
            find ~/.buildozer -path "*/recipe-build/pygame*" -maxdepth 8 -exec rm -rf {} + 2>/dev/null || true
            find ~/.buildozer -path "*/python-installs/*/pygame*"              2>/dev/null | xargs rm -rf 2>/dev/null || true
          fi
          echo "$CURRENT" > "$STAMP"

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      # Always upload the build log so failures can be diagnosed.
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log

      - name: Upload APK as workflow artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: retris-apk-${{ github.sha }}
          path: bin/*.apk
          retention-days: 30

      - name: Publish APK to GitHub Release (permanent download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "RETRIS — Latest Android APK"
          body: |
            ## Install RETRIS on Android

            1. Download **retris-*.apk** below
            2. Open it on your phone
            3. If prompted, enable *Install from unknown sources* in **Settings → Security**

            ---
            Built from `${{ github.ref_name }}` · `${{ github.sha }}`
          files: bin/*.apk
          prerelease: true
          make_latest: true
